<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minecraft 1.8.7 - Lav Fix</title>
    <style>
        html, body { position: fixed; width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background: #000; touch-action: none; font-family: 'Courier New', monospace; }
        #ui { position: absolute; inset: 0; pointer-events: none; z-index: 100; }
        #menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 280px; padding: 20px; background: rgba(0,0,0,0.9); border: 4px solid #555; color: #fff; text-align: center; pointer-events: auto; }
        .btn { background: #555; border: 2px solid #000; color: #fff; padding: 12px; margin: 10px 0; cursor: pointer; display: block; width: 100%; font-weight: bold; }
        #joystick { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; pointer-events: auto; }
        #stick { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: rgba(255,255,255,0.4); border-radius: 50%; }
        #actions { position: absolute; bottom: 40px; right: 40px; display: flex; gap: 12px; pointer-events: auto; }
        .act-btn { width: 70px; height: 70px; background: rgba(0,0,0,0.6); border: 2px solid #fff; border-radius: 12px; color: #fff; display: flex; justify-content: center; align-items: center; text-align: center; font-size: 10px; font-weight: bold; }
        #hotbar { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); display: flex; background: rgba(0,0,0,0.8); border: 3px solid #1e1e1e; padding: 4px; gap: 4px; pointer-events: auto; }
        .slot { width: 40px; height: 40px; background: #8B8B8B; border: 3px solid #373737; }
        .slot.active { border-color: #fff; }
    </style>
</head>
<body>

<div id="ui">
    <div id="menu">
        <h2 style="margin:0">LAV FIX v1.1</h2>
        <div style="color:#ffff55; font-size:10px; margin-bottom:15px">Purpleguy © 2026 - tablet power</div>
        <button class="btn" id="start-btn">OYUNA BAŞLA</button>
    </div>
    <div id="joystick"><div id="stick"></div></div>
    <div id="actions">
        <div class="act-btn" id="break-btn">KIR</div>
        <div class="act-btn" id="jump-btn">ZIPLA</div>
    </div>
    <div id="hotbar"></div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    const loader = new THREE.TextureLoader();
    // ÖNEMLİ: Dosya adını senin yüklediğin png ile aynı yaptım
    const terrainTex = loader.load('assets/sprites/184716.png');
    terrainTex.magFilter = THREE.NearestFilter;
    terrainTex.minFilter = THREE.NearestFilter;

    // LAV SORUNUNU ÇÖZEN FONKSİYON
    // Senin spritesheet 16x16 değilse (örneğin 32x32 ise) buradaki 16 rakamlarını ona göre değiştirmeliyiz
    function getTile(x, y) {
        const tex = terrainTex.clone();
        tex.repeat.set(1/16, 1/16); 
        // Lav genelde alt satırlarda olur, o yüzden Y koordinatını kaydırdık
        tex.offset.set(x/16, (15-y)/16); 
        return tex;
    }

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 1.2));

    // KOORDİNAT DÜZELTMESİ: (0,0) lav çıktıysa, (0,1) veya (1,0) dene
    // Genelde çimen (0,0) veya (3,0) civarıdır.
    const grassTex = getTile(3, 0); 

    const geo = new THREE.BoxGeometry(1, 1, 1);
    for(let x=-8; x<8; x++) {
        for(let z=-8; z<8; z++) {
            const m = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ map: grassTex }));
            m.position.set(x, 0, z);
            scene.add(m);
        }
    }
    camera.position.set(0, 2, 5);

    // POV & JOYSTICK SİSTEMİ (Önceki kodla aynı, sağlam çalışır)
    let isPlaying = false;
    let lon = 0, lat = 0;
    let startX, startY;
    document.addEventListener('touchstart', (e) => {
        if(e.touches[0].clientX > window.innerWidth / 2) {
            startX = e.touches[0].clientX; startY = e.touches[0].clientY;
        }
    });
    document.addEventListener('touchmove', (e) => {
        if(!isPlaying) return;
        for(let t of e.touches) {
            if(t.clientX > window.innerWidth / 2) {
                let dx = t.clientX - startX;
                let dy = t.clientY - startY;
                lon += dx * 0.2; lat = Math.max(-85, Math.min(85, lat - dy * 0.2));
                startX = t.clientX; startY = t.clientY;
            }
        }
    });

    document.getElementById('start-btn').onclick = () => {
        isPlaying = true;
        document.getElementById('menu').style.display = 'none';
    };

    function animate() {
        requestAnimationFrame(animate);
        if(isPlaying) {
            const phi = THREE.MathUtils.degToRad(90 - lat);
            const theta = THREE.MathUtils.degToRad(lon);
            camera.lookAt(new THREE.Vector3().setFromSphericalCoords(1, phi, theta).add(camera.position));
        }
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
