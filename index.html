<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Minecraft 1.8.7 - Server Console Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; user-select: none; display: flex; }
        #game-container { position: relative; width: 75%; height: 100vh; }
        
        /* SERVER CONSOLE PANEL */
        #console-panel { 
            width: 25%; height: 100vh; background: #0c0c0c; 
            border-left: 2px solid #333; color: #aaa; 
            display: flex; flex-direction: column; font-size: 12px;
        }
        #console-header { background: #1a1a1a; padding: 10px; color: #eee; font-weight: bold; border-bottom: 1px solid #333; }
        #console-logs { flex-grow: 1; padding: 10px; overflow-y: auto; white-space: pre-wrap; word-wrap: break-word; }
        .log-info { color: #55ff55; }
        .log-warn { color: #ffff55; }
        .log-time { color: #888; margin-right: 5px; }

        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; transform: translate(-50%, -50%); pointer-events: none; z-index: 10; color: white; font-size: 24px; display: flex; justify-content: center; align-items: center; }
        #ui-layer { position: absolute; bottom: 15px; left: 0; width: 100%; pointer-events: none; display: flex; justify-content: center; }
        .hotbar { display: flex; background: rgba(0,0,0,0.8); border: 3px solid #1e1e1e; padding: 3px; gap: 3px; pointer-events: auto; }
        .slot { width: 45px; height: 45px; background: #8B8B8B; border: 3px solid #373737; display: flex; justify-content: center; align-items: center; }
        .slot.selected { border: 3px solid #FFF; background: #c6c6c6; }
        
        #menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 500; cursor: pointer; text-align: center; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="menu">
            <h1>MINECRAFT 1.8.7</h1>
            <p style="color:#ffff55">Purpleguy © 2026 - tablet power</p>
            <p>SUNUCUYA BAĞLANMAK İÇİN TIKLA</p>
        </div>
        <div id="crosshair">+</div>
        <div id="ui-layer"><div class="hotbar" id="hotbar-ui"></div></div>
    </div>

    <div id="console-panel">
        <div id="console-header">SERVER CONSOLE (v1.8.7)</div>
        <div id="console-logs" id="logs"></div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        const logsDiv = document.getElementById('console-logs');
        
        // --- CONSOLE LOG SİSTEMİ ---
        function serverLog(msg, type = "info") {
            const time = new Date().toLocaleTimeString();
            const logElement = document.createElement('div');
            logElement.innerHTML = `<span class="log-time">[${time}]</span> <span class="log-${type}">[Server thread/${type.toUpperCase()}]:</span> ${msg}`;
            logsDiv.appendChild(logElement);
            logsDiv.scrollTop = logsDiv.scrollHeight;
            console.log(`[MC Server]: ${msg}`);
        }

        // Başlangıç Logları
        serverLog("Starting minecraft server version 1.8.7");
        serverLog("Loading properties...");
        serverLog("Default game type: SURVIVAL");
        serverLog("Generating area, please wait...", "info");

        // --- ENGINE ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(75, (window.innerWidth * 0.75) / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth * 0.75, window.innerHeight);
        document.getElementById('game-container').appendChild(renderer.domElement);

        const controls = new PointerLockControls(camera, document.body);
        document.getElementById('menu').onclick = () => {
            controls.lock();
            serverLog("Player joined the game: Purpleguy", "info");
        };
        controls.addEventListener('unlock', () => serverLog("Player left the game: Purpleguy (Disconnected)", "warn"));

        // Bloklar
        const blocks = [];
        const box = new THREE.BoxGeometry(1, 1, 1);
        const colors = [0x567d46, 0x888888, 0x795548, 0x3e2723];

        function createBlock(x, y, z, colorIdx) {
            const m = new THREE.Mesh(box, new THREE.MeshStandardMaterial({ color: colors[colorIdx] }));
            m.position.set(x, y, z);
            scene.add(m);
            blocks.push(m);
        }

        // Zemin ve Başlangıç
        for(let x=-10; x<10; x++) for(let z=-10; z<10; z++) createBlock(x, 0, z, 0);
        serverLog("Preparing spawn area: 100%");

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        camera.position.set(0, 5, 5);

        // UI
        let sel = 0;
        const hb = document.getElementById('hotbar-ui');
        colors.forEach((c, i) => {
            const s = document.createElement('div');
            s.className = `slot ${i===0?'selected':''}`;
            s.id = `hb-${i}`;
            s.innerHTML = `<div style="width:30px;height:30px;background:#${c.toString(16)}"></div>`;
            hb.appendChild(s);
        });

        // --- ETKİLEŞİM ---
        let keys = {};
        window.onkeydown = (e) => {
            keys[e.code] = true;
            if(e.key >= 1 && e.key <= 4) {
                sel = e.key - 1;
                document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
                document.getElementById('hb-'+sel).classList.add('selected');
                serverLog(`Selected slot: ${sel + 1}`);
            }
        };
        window.onkeyup = (e) => keys[e.code] = false;

        window.onmousedown = (e) => {
            if(!controls.isLocked) return;
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(), camera);
            const hits = ray.intersectObjects(blocks);
            if(hits.length > 0 && hits[0].distance < 6) {
                const pos = hits[0].object.position;
                if(e.button === 0) {
                    serverLog(`Block broken at [${pos.x}, ${pos.y}, ${pos.z}]`);
                    scene.remove(hits[0].object);
                    blocks.splice(blocks.indexOf(hits[0].object), 1);
                } else {
                    const p = pos.clone().add(hits[0].face.normal);
                    serverLog(`Block placed at [${p.x}, ${p.y}, ${p.z}]`);
                    createBlock(p.x, p.y, p.z, sel);
                }
            }
        };

        function animate() {
            requestAnimationFrame(animate);
            if(controls.isLocked) {
                if(keys['KeyW']) controls.moveForward(0.1);
                if(keys['KeyS']) controls.moveForward(-0.1);
                if(keys['KeyA']) controls.moveRight(-0.1);
                if(keys['KeyD']) controls.moveRight(0.1);
                if(camera.position.y > 1.8) camera.position.y -= 0.1;
                if(keys['Space'] && camera.position.y <= 1.9) camera.position.y += 2;
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
