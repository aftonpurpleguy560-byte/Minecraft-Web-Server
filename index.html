<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft 1.8.7 - Purpleguy Server Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; user-select: none; }
        canvas { display: block; }
        
        /* Crosshair */
        #crosshair { 
            position: absolute; top: 50%; left: 50%; 
            width: 20px; height: 20px; 
            transform: translate(-50%, -50%); 
            pointer-events: none; z-index: 10; 
            color: white; font-size: 24px; 
            display: flex; justify-content: center; align-items: center;
        }

        /* Server UI */
        #server-overlay {
            position: absolute; top: 10px; right: 10px;
            background: rgba(0,0,0,0.75); color: #00ff00;
            padding: 12px; border: 2px solid #555;
            font-size: 13px; z-index: 100; pointer-events: none;
            border-radius: 4px; line-height: 1.5;
        }

        /* Hotbar */
        #ui-container {
            position: absolute; bottom: 0; left: 0; width: 100%;
            height: 100%; pointer-events: none;
            display: flex; justify-content: center; align-items: flex-end;
            padding-bottom: 20px;
        }
        .hotbar {
            display: flex; background: rgba(0,0,0,0.85);
            border: 4px solid #1e1e1e; padding: 4px; gap: 4px;
            pointer-events: auto;
        }
        .slot {
            width: 50px; height: 50px; background: #8B8B8B;
            border: 4px solid #373737; display: flex;
            justify-content: center; align-items: center;
        }
        .slot.selected {
            border: 4px solid #FFFFFF; background: #c6c6c6;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        .block-icon { width: 34px; height: 34px; border: 1px solid #000; }

        /* Menu */
        #menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); color: white;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 500; cursor: pointer; text-align: center;
        }
        .motd { color: #ffff55; font-style: italic; margin-top: 10px; font-size: 18px; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>MINECRAFT 1.8.7</h1>
        <div class="motd">"A Minecraft Server - Purpleguy Edition"</div>
        <p style="margin-top:30px; font-size: 20px;">BAĞLANMAK İÇİN TIKLA</p>
        <p style="font-size: 12px; color: #888;">W,A,S,D: Yürü | Shift: Eğil | Ctrl: Koş | Space: Zıpla</p>
    </div>

    <div id="server-overlay">
        <div style="color: #55ff55; font-weight: bold;">[SERVER ONLINE]</div>
        <div>IP: 127.0.0.1:25565</div>
        <div>TPS: 20.0</div>
        <div>PLAYERS: <span id="p-count">1/20</span></div>
    </div>

    <div id="crosshair">+</div>

    <div id="ui-container">
        <div class="hotbar" id="hotbar">
            </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- DOKU ÜRETİCİ (16x16 Pixel Art) ---
        function generateTexture(colors) {
            const canvas = document.createElement('canvas');
            canvas.width = 16; canvas.height = 16;
            const ctx = canvas.getContext('2d');
            for(let x=0; x<16; x++){
                for(let y=0; y<16; y++){
                    ctx.fillStyle = colors[Math.floor(Math.random()*colors.length)];
                    ctx.fillRect(x, y, 1, 1);
                }
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.magFilter = THREE.NearestFilter;
            return tex;
        }

        const textures = {
            grass: generateTexture(['#5d9943', '#4d8a32', '#567d46']),
            stone: generateTexture(['#888888', '#777777', '#999999']),
            dirt: generateTexture(['#795548', '#6d4c41', '#5d4037']),
            plank: generateTexture(['#a1887f', '#8d6e63', '#bcaaa4']),
            wood: generateTexture(['#3e2723', '#4e342e', '#2d1d1a']),
            glass: generateTexture(['#e1f5fe44', '#ffffff66'])
        };

        const BLOCKS = [
            { name: 'Grass', tex: textures.grass, col: '#567d46' },
            { name: 'Stone', tex: textures.stone, col: '#888' },
            { name: 'Dirt', tex: textures.dirt, col: '#795548' },
            { name: 'Wood', tex: textures.wood, col: '#3e2723' },
            { name: 'Plank', tex: textures.plank, col: '#a1887f' },
            { name: 'Glass', tex: textures.glass, col: '#add8e6', trans: true }
        ];

        // --- MOTOR KURULUMU ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 1, 100);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new PointerLockControls(camera, document.body);
        document.getElementById('menu').onclick = () => controls.lock();
        controls.addEventListener('lock', () => document.getElementById('menu').style.display = 'none');
        controls.addEventListener('unlock', () => document.getElementById('menu').style.display = 'flex');

        // --- DÜNYA VE FİZİK ---
        const blocks = [];
        const boxGeo = new THREE.BoxGeometry(1, 1, 1);
        let selectedIdx = 0;

        function addBlock(x, y, z, id) {
            const type = BLOCKS[id];
            const mat = new THREE.MeshStandardMaterial({ 
                map: type.tex, 
                transparent: type.trans || false,
                opacity: type.trans ? 0.5 : 1
            });
            const mesh = new THREE.Mesh(boxGeo, mat);
            mesh.position.set(Math.round(x), Math.round(y), Math.round(z));
            scene.add(mesh);
            blocks.push(mesh);
        }

        // Başlangıç Dünyası (Server View Distance: 10)
        for(let x=-15; x<15; x++) {
            for(let z=-15; z<15; z++) {
                addBlock(x, 0, z, 0); // Zemin
            }
        }

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const light = new THREE.DirectionalLight(0xffffff, 0.5);
        light.position.set(10, 20, 10);
        scene.add(light);

        camera.position.set(0, 5, 5);

        // --- UI ---
        const hb = document.getElementById('hotbar');
        BLOCKS.forEach((b, i) => {
            const s = document.createElement('div');
            s.className = `slot ${i===0?'selected':''}`;
            s.id = `hb-${i}`;
            s.innerHTML = `<div class="block-icon" style="background:${b.col}"></div>`;
            hb.appendChild(s);
        });

        // --- KONTROLLER ---
        let velocity = new THREE.Vector3();
        let keys = {};
        const playerSize = 0.3;

        window.onkeydown = (e) => {
            keys[e.code] = true;
            if(e.key >= 1 && e.key <= BLOCKS.length) {
                selectedIdx = e.key - 1;
                document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
                document.getElementById('hb-'+selectedIdx).classList.add('selected');
            }
        };
        window.onkeyup = (e) => keys[e.code] = false;

        function checkCollision(pos) {
            for (let b of blocks) {
                const p = b.position;
                if (pos.x + playerSize > p.x - 0.5 && pos.x - playerSize < p.x + 0.5 &&
                    pos.z + playerSize > p.z - 0.5 && pos.z - playerSize < p.z + 0.5 &&
                    pos.y > p.y - 0.5 && pos.y - 1.8 < p.y + 0.5) return true;
            }
            return false;
        }

        window.onmousedown = (e) => {
            if(!controls.isLocked) return;
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(), camera);
            const hits = ray.intersectObjects(blocks);
            if(hits.length > 0 && hits[0].distance < 6) {
                if(e.button === 0) { // KIR
                    scene.remove(hits[0].object);
                    blocks.splice(blocks.indexOf(hits[0].object), 1);
                } else { // KOY
                    const p = hits[0].object.position.clone().add(hits[0].face.normal);
                    addBlock(p.x, p.y, p.z, selectedIdx);
                }
            }
        };

        // --- LOOP ---
        let lastTime = performance.now();
        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now();
            const delta = Math.min((time - lastTime) / 1000, 0.1);

            if(controls.isLocked) {
                const speed = (keys['ControlLeft'] ? 12 : (keys['ShiftLeft'] ? 3 : 7)) * delta;
                velocity.y -= 25 * delta;
                
                const oldPos = camera.position.clone();
                const move = new THREE.Vector3();
                if(keys['KeyW']) move.z += 1;
                if(keys['KeyS']) move.z -= 1;
                if(keys['KeyA']) move.x -= 1;
                if(keys['KeyD']) move.x += 1;
                move.normalize();

                controls.moveRight(move.x * speed);
                if(checkCollision(camera.position)) camera.position.x = oldPos.x;
                
                controls.moveForward(move.z * speed);
                if(checkCollision(camera.position)) camera.position.z = oldPos.z;

                camera.position.y += velocity.y * delta;
                if(checkCollision(camera.position)) {
                    if(velocity.y < 0) {
                        camera.position.y = oldPos.y;
                        velocity.y = 0;
                        if(keys['Space']) velocity.y = 10;
                    } else {
                        camera.position.y = oldPos.y;
                        velocity.y = 0;
                    }
                }
            }
            renderer.render(scene, camera);
            lastTime = time;
        }
        animate();
    </script>
</body>
</html>
